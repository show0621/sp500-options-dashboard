name: Daily S&P500 Alpha Scanner

on:
  schedule:
    # 每天 UTC 時間 22:00 執行 (大約是美股收盤後)
    - cron: '0 22 * * *'
  workflow_dispatch: # 允許你手動點擊按鈕測試

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas lxml
          
      - name: Run Scanner Script
        run: python scanner.py
        
      - name: Commit and Push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add signals.csv
          # 如果沒有變動就不 commit
          git diff-index --quiet HEAD || git commit -m "🤖 自動更新 S&P 500 共振推薦名單"
          git push
